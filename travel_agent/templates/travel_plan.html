<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ info.destination }} 旅行规划</title>
    <style>
        body { font-family: sans-serif; }
        .plan { border: 1px solid #ccc; padding: 10px; margin-bottom: 20px; }
        .attraction-image { max-width: 300px; max-height: 200px; }
    </style>
</head>
<body>
    <h1>{{ info.destination }} 旅行规划</h1>
    <p>从 {{ info.departure_city }} 出发, 预算: {{ info.budget }}</p>

    {% for plan_name, plan_activities in plans.items() %}
        <div class="plan">
            <h2>{{ plan_name }}方案</h2>
            {% for activity in plan_activities %}
                <h3>Day {{ activity.day }}: {{ activity.activity }}</h3>
                <p>{{ activity.description }}</p>
                <img src="{{ activity.image_url }}" alt="{{ activity.activity }}" class="attraction-image">
            {% endfor %}
        </div>
    {% endfor %}
</body>
</html>
